<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training Tracker</title>
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.1);
  --border-md: rgba(0,0,0,0.2);
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #9a9a96;
  --accent: #185fa5;
  --accent-bg: #e6f1fb;
  --accent-text: #0c447c;
  --green-bg: #eaf3de;
  --green-text: #27500a;
  --amber-bg: #faeeda;
  --amber-text: #633806;
  --red-bg: #fcebeb;
  --red-text: #501313;
  --nav-h: 60px;
  --r: 10px;
  --rl: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Courier New', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #161614;
    --surface: #1e1e1c;
    --surface2: #272725;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.2);
    --text: #f0efe9;
    --text2: #a0a09a;
    --text3: #6b6b65;
    --accent: #378add;
    --accent-bg: #0c2a44;
    --accent-text: #85b7eb;
    --green-bg: #1a2e08;
    --green-text: #97c459;
    --amber-bg: #2e1e06;
    --amber-text: #fac775;
    --red-bg: #2e0808;
    --red-text: #f09595;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 16px) + 8px);
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── BOTTOM NAV ── */
#bnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 9999;
  display: flex;
  align-items: flex-start;
  background: var(--surface);
  border-top: 1.5px solid var(--border-md);
  padding-top: 6px;
  padding-bottom: env(safe-area-inset-bottom, 6px);
  -webkit-transform: translate3d(0,0,0);
  transform: translate3d(0,0,0);
}
.ni {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 0 2px; background: none; border: none; cursor: pointer;
  color: var(--text3); font-family: var(--font); min-height: 44px;
}
.ni.on { color: var(--accent); }
.ni svg { width: 22px; height: 22px; stroke-width: 1.8; }
.ni span { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }

/* ── STICKY HEADER ── */
.sthdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 0;
}
.hrow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.ptitle { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }

/* ── PHASE PILL ── */
.ppill { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px; }
.p1pill { background: #e1f5ee; color: #085041; }
.p2pill { background: var(--accent-bg); color: var(--accent-text); }
.p3pill { background: var(--amber-bg); color: var(--amber-text); }
.p4pill { background: #faece7; color: #4a1b0c; }
@media (prefers-color-scheme: dark) {
  .p1pill { background: #04342c; color: #5dcaa5; }
  .p2pill { background: #042c53; color: #85b7eb; }
  .p3pill { background: #412402; color: #fac775; }
  .p4pill { background: #2e1206; color: #f0997b; }
}

/* ── WEEK CTRL ── */
.wctrl { display: flex; align-items: center; gap: 8px; }
.wlbl { font-size: 13px; color: var(--text2); min-width: 52px; text-align: center; }
.bcircle {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border-md); background: var(--surface2);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font);
}
.bcircle:active { background: var(--bg); }

/* ── DAY TABS ── */
.dtabs { display: flex; gap: 6px; padding-bottom: 12px; }
.dtab {
  flex: 1; padding: 8px 6px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; text-align: center;
}
.dtab.on { background: var(--surface); border: 2px solid var(--accent); }
.dtab .dl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); font-weight: 500; }
.dtab.on .dl { color: var(--accent-text); }
.dtab .dn { font-size: 12px; color: var(--text); font-weight: 500; margin-top: 1px; line-height: 1.3; }

/* ── STATS ── */
.sgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px 16px; }
.sc { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 10px 12px; }
.sl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); font-weight: 500; }
.sv { font-size: 24px; font-weight: 600; font-family: var(--mono); margin-top: 2px; }

/* ── CALLOUT ── */
.callout { margin: 0 16px 10px; padding: 11px 14px; border-radius: var(--r); border: 1px solid var(--accent); background: var(--accent-bg); }
.cllabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent-text); font-weight: 500; margin-bottom: 3px; }
.cltext { font-size: 13px; color: var(--accent-text); line-height: 1.5; }

/* ── SECTION CARDS ── */
.swrap { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; }
.shdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; -webkit-user-select: none; user-select: none; }
.shdr:active { background: var(--surface2); }
.hleft { display: flex; flex-direction: column; gap: 2px; }
.htrow { display: flex; align-items: center; gap: 6px; }
.stitle { font-size: 14px; font-weight: 500; }
.ssub { font-size: 12px; color: var(--text2); }
.chev { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.chev.op { transform: rotate(180deg); }
.sbody { border-top: 1px solid var(--border); display: none; }
.sbody.op { display: block; }
.ptrack { height: 3px; background: var(--surface2); }
.pfill { height: 3px; background: var(--accent); transition: width 0.3s; }

/* ── EXERCISE ROWS ── */
.exrow { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
.exrow:last-of-type { border-bottom: none; }
.exrow.done { opacity: 0.36; }
.exrow.done .exname { text-decoration: line-through; }
input[type="checkbox"] { width: 18px; height: 18px; margin-top: 1px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
.exc { flex: 1; min-width: 0; }
.extop { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.exname { font-size: 14px; line-height: 1.4; }
.exbot { display: flex; align-items: baseline; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.exreps { font-size: 12px; color: var(--text2); font-family: var(--mono); white-space: nowrap; }
.exnote { font-size: 11px; color: var(--text3); font-style: italic; line-height: 1.4; }

/* ── BADGES ── */
.badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 12px; flex-shrink: 0; white-space: nowrap; }
.bleft { background: var(--amber-bg); color: var(--amber-text); }
.breset { background: var(--green-bg); color: var(--green-text); }
.bday { background: var(--accent-bg); color: var(--accent-text); }
.bp1 { background: #e1f5ee; color: #085041; }
.bp2 { background: #e6f1fb; color: #0c447c; }
.bp3 { background: #faeeda; color: #633806; }
.bp4 { background: #faece7; color: #4a1b0c; }
@media (prefers-color-scheme: dark) {
  .bp1 { background: #04342c; color: #5dcaa5; }
  .bp2 { background: #042c53; color: #85b7eb; }
  .bp3 { background: #412402; color: #fac775; }
  .bp4 { background: #2e1206; color: #f0997b; }
}

/* ── FOCUS BLOCK ── */
.fblock { padding: 10px 14px 12px; border-top: 1px solid var(--border); background: var(--surface2); }
.flbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); font-weight: 500; margin-bottom: 5px; }
.fitem { display: flex; gap: 7px; align-items: flex-start; padding: 2px 0; }
.fdot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); margin-top: 6px; flex-shrink: 0; }
.ftxt { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* ── ACTION BAR ── */
.abar { padding: 12px 16px 4px; display: flex; gap: 8px; }
.bcomplete { flex: 1; padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--border-md); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.bcomplete:active { background: var(--green-bg); color: var(--green-text); }
.bnext { padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font); }
.bnext:active { background: var(--bg); }

/* ── PROGRAM VIEW ── */
.pwcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 6px; overflow: hidden; }
.pwhdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
.pwhdr:active { background: var(--surface2); }
.pwnum { font-size: 13px; font-weight: 600; font-family: var(--mono); min-width: 58px; }
.pwbody { display: none; border-top: 1px solid var(--border); padding: 10px 14px; }
.pwbody.op { display: block; }
.pwchange { font-size: 12px; color: var(--accent-text); background: var(--accent-bg); padding: 8px 10px; border-radius: 6px; margin-bottom: 8px; line-height: 1.5; }
.pdsec { margin-bottom: 8px; }
.pdlbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 3px; }
.pdex { font-size: 12px; color: var(--text2); padding: 2px 0; line-height: 1.5; }
.pdex em { font-family: var(--mono); font-style: normal; color: var(--text3); font-size: 11px; }

/* ── HISTORY VIEW ── */
.hcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); margin-bottom: 8px; overflow: hidden; }
.hchdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.hchdr:active { background: var(--surface2); }
.hcbody { display: none; border-top: 1px solid var(--border); padding: 10px 14px; }
.hcbody.op { display: block; }
.hempty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }

/* ── PROGRESS VIEW ── */
.ccrd { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 14px; margin-bottom: 10px; }
.ctitle { font-size: 13px; font-weight: 500; margin-bottom: 12px; }

/* ── SETTINGS ── */
.setcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: 10px; }
.setrow { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.setrow:last-child { border-bottom: none; }
.setlbl { font-size: 14px; }
.setsub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.setval { font-size: 14px; color: var(--text2); font-family: var(--mono); }
.baction { width: 100%; padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; font-family: var(--font); text-align: left; margin-bottom: 8px; }
.baction.danger { color: var(--red-text); background: var(--red-bg); border-color: transparent; }
.baction:active { opacity: 0.65; }

/* ── MODAL ── */
.modal { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; }
.modal.op { display: flex; }
.msheet { background: var(--surface); border-radius: var(--rl) var(--rl) 0 0; width: 100%; max-width: 600px; padding: 20px 16px; padding-bottom: max(20px, calc(16px + env(safe-area-inset-bottom))); }
.mtitle { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.msub { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.minput { width: 100%; padding: 12px 14px; border: 1px solid var(--border-md); border-radius: var(--r); background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--font); margin-bottom: 12px; resize: none; }
.minput:focus { outline: none; border-color: var(--accent); }
.mbtns { display: flex; gap: 8px; }
.bmsave { flex: 1; padding: 13px; border-radius: var(--r); border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.bmskip { padding: 13px 20px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font); }

/* ── TOAST ── */
.toast { position: fixed; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 14px); left: 50%; transform: translateX(-50%) translateY(6px); background: var(--text); color: var(--surface); padding: 8px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 10001; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TODAY -->
<div id="v-today" class="view active">
  <div class="sthdr">
    <div class="hrow">
      <span class="ppill p2pill" id="today-phase">Phase 1</span>
      <div class="wctrl">
        <button class="bcircle" onclick="changeWeek(-1)">−</button>
        <span class="wlbl" id="today-week">Week 1</span>
        <button class="bcircle" onclick="changeWeek(1)">+</button>
      </div>
    </div>
    <div class="dtabs">
      <div class="dtab" id="tab-A" onclick="setDay('A')"><div class="dl">Day A</div><div class="dn">Posterior chain</div></div>
      <div class="dtab" id="tab-B" onclick="setDay('B')"><div class="dl">Day B</div><div class="dn">Upper body</div></div>
      <div class="dtab" id="tab-C" onclick="setDay('C')"><div class="dl">Day C</div><div class="dn">Mobility</div></div>
    </div>
  </div>
  <div class="sgrid">
    <div class="sc"><div class="sl">Total</div><div class="sv" id="s-total">0</div></div>
    <div class="sc"><div class="sl">This week</div><div class="sv" id="s-week">0</div></div>
    <div class="sc"><div class="sl">Streak</div><div class="sv" id="s-streak">0</div></div>
  </div>
  <div id="today-callout"></div>
  <div class="swrap" id="today-body"></div>
  <div class="abar">
    <button class="bcomplete" onclick="markDone()">✓ Mark session complete</button>
    <button class="bnext" onclick="nextDay()">Next →</button>
  </div>
</div>

<!-- PROGRAM -->
<div id="v-program" class="view">
  <div class="sthdr" style="padding-bottom:12px;">
    <div class="hrow">
      <span class="ptitle">Program</span>
      <span class="ppill p2pill" id="prog-phase">Phase 1</span>
    </div>
  </div>
  <div id="prog-body" style="padding:0 16px 16px;"></div>
</div>

<!-- HISTORY -->
<div id="v-history" class="view">
  <div class="sthdr" style="padding-bottom:12px;">
    <div class="hrow"><span class="ptitle">History</span></div>
  </div>
  <div style="padding:12px 16px;" id="hist-body"></div>
</div>

<!-- PROGRESS -->
<div id="v-progress" class="view">
  <div class="sthdr" style="padding-bottom:12px;">
    <div class="hrow"><span class="ptitle">Progress</span></div>
  </div>
  <div style="padding:12px 16px;" id="prog-charts"></div>
</div>

<!-- SETTINGS -->
<div id="v-settings" class="view">
  <div class="sthdr" style="padding-bottom:12px;">
    <div class="hrow"><span class="ptitle">Settings</span></div>
  </div>
  <div style="padding:12px 16px;" id="set-body"></div>
</div>

<!-- BOTTOM NAV -->
<nav id="bnav">
  <button class="ni on" id="n-today" onclick="go('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span>Today</span>
  </button>
  <button class="ni" id="n-program" onclick="go('program')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    <span>Program</span>
  </button>
  <button class="ni" id="n-history" onclick="go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <span>History</span>
  </button>
  <button class="ni" id="n-progress" onclick="go('progress')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V12M9 20V5M14 20V14M19 20V8"/></svg>
    <span>Progress</span>
  </button>
  <button class="ni" id="n-settings" onclick="go('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</nav>

<!-- MODAL -->
<div class="modal" id="modal" onclick="modalBg(event)">
  <div class="msheet">
    <div class="mtitle">Session complete!</div>
    <div class="msub">Add a note about how it felt (optional)</div>
    <textarea class="minput" id="mnote" rows="3" placeholder="e.g. Left glute fired well, neck felt tight during rows..."></textarea>
    <div class="mbtns">
      <button class="bmsave" onclick="saveSession()">Save session</button>
      <button class="bmskip" onclick="saveSession(true)">Skip</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ── DATA ─────────────────────────────────────────────────────

const RESET = [
  {id:'r1',name:'Left sidelying breathing',reps:'2 min',lf:false,note:'Right arm overhead. Breathe into LEFT lateral ribs only'},
  {id:'r2',name:'Supine cervical self-traction',reps:'90 sec',lf:false,note:'Hands behind head, chin tuck, gentle cranial lift. Decompress upper cervical'},
  {id:'r3',name:'90/90 breathing (feet elevated)',reps:'2 min',lf:false,note:'Posterior pelvic tilt. Full exhale every breath. Feel ribs descend'},
  {id:'r4',name:'Dead bug',sets:'3',reps:'6 reps',lf:false,note:'Chin tucked, occiput on floor. Stop immediately if neck extends'},
  {id:'r5',name:'Open book rotations',reps:'5 each + 3s hold',lf:false,note:'Sidelying. Let arm weight load the rotation — do not force'},
  {id:'r6',name:'Glute bridge march',reps:'10 reps, 3s hold',lf:false,note:'Feel LEFT glute fire. If lower back fires first, regress to both feet'},
  {id:'r7',name:'Cervical proprioception in bird dog',reps:'5 each direction',lf:false,note:'Slow head turns in bird dog. Eyes open first, then try closed'}
];

const DAYS = {
  A:{
    title:'Posterior chain + left activation',
    sub:'6 exercises · 45–55 min',

  1:'Starting fresh — all exercises at bodyweight or 0.5kg only. Focus entirely on feeling the correct muscles, not on load.',
  3:'Week 3 — increase reps and hold times where you feel stable. Add 3 reps to exercises you feel in control of.',

  7:'Week 7 — push skipping to 45-sec bouts with alternating feet. Increase lunge load if left glute is firing reliably.',
  9:'Phase 3 begins. 60-sec skipping bouts. Turkish get-up with 1kg. 3kg rows on Day B. Bulgarian split squat introduced as optional Day A finisher.',

// ── STATE ────────────────────────────────────────────────────

const DEF = {day:'A',week:1,checked:{},sessions:[],stats:{total:0,streak:0,best:0,lastDate:null,wkStart:null,wkCount:0}};
let S = JSON.parse(JSON.stringify(DEF));
let pending = null;
let charts = {};

function load(){try{const r=localStorage.getItem('tt-v2');if(r)Object.assign(S,JSON.parse(r));}catch(e){}}
function save(){try{localStorage.setItem('tt-v2',JSON.stringify(S));}catch(e){}}

// ── HELPERS ──────────────────────────────────────────────────

function phase(w){return PHASES.find(p=>p.weeks.includes(w))||PHASES[3];}
function reps(ex,w){if(!ex.v)return{r:ex.reps,n:ex.note};const v=ex.v.find(x=>x.w.includes(w));return v?{r:v.r,n:v.n}:{r:ex.reps,n:ex.note};}
function allIds(){return[...RESET.map(e=>e.id),...DAYS[S.day].ex.map(e=>e.id)];}
function wkStart(){const d=new Date(),day=d.getDay(),diff=day===0?-6:1-day,m=new Date(d);m.setDate(d.getDate()+diff);m.setHours(0,0,0,0);return m.toISOString().split('T')[0];}
function fmtDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function relDate(s){const d=new Date(s+'T12:00:00'),t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);const diff=Math.round((t-d)/86400000);if(!diff)return'Today';if(diff===1)return'Yesterday';if(diff<7)return diff+' days ago';return Math.round(diff/7)+' week'+(Math.round(diff/7)>1?'s':'')+' ago';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2000);}

// ── NAV ──────────────────────────────────────────────────────

let cur='today';
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('active');
  document.getElementById('n-'+v).classList.add('on');
  cur=v;
  if(v==='today')rToday();
  if(v==='program')rProg();
  if(v==='history')rHist();
  if(v==='progress')rCharts();
  if(v==='settings')rSet();
}

// ── TODAY VIEW ───────────────────────────────────────────────

function rToday(){
  const p=phase(S.week);
  const pl=document.getElementById('today-phase');
  pl.textContent=p.short; pl.className='ppill '+p.pcls;
  document.getElementById('today-week').textContent='Week '+S.week;

  document.getElementById('s-week').textContent=S.stats.wkCount;
  document.getElementById('s-streak').textContent=S.stats.streak;
  ['A','B','C'].forEach(d=>{const t=document.getElementById('tab-'+d);t.className='dtab'+(S.day===d?' on':'');});

  const cc=document.getElementById('today-callout');
  const ch=CHANGES[S.week];
  cc.innerHTML=ch?`<div class="callout"><div class="cllabel">This week</div><div class="cltext">${ch}</div></div>`:'';

  const day=DAYS[S.day];
  const rRows=RESET.map(ex=>exRow(ex,S.week)).join('');
  const mRows=day.ex.map(ex=>exRow(ex,S.week)).join('');
  const focusHtml=day.focus.map(f=>`<div class="fitem"><span class="fdot"></span><span class="ftxt">${f}</span></div>`).join('');

  document.getElementById('today-body').innerHTML=`
    <div class="scard">
      <div class="shdr" onclick="tog('reset')">
        <div class="hleft"><div class="htrow"><span class="badge breset">Reset</span><span class="stitle">Reset phase</span></div><span class="ssub">Every session · 12–15 min</span></div>
        <span class="chev op" id="chev-reset">▼</span>
      </div>
      <div class="sbody op" id="sb-reset">
        <div class="ptrack"><div class="pfill" id="pf-reset" style="width:0%"></div></div>
        ${rRows}
      </div>
    </div>
    <div class="scard">
      <div class="shdr" onclick="tog('main')">
        <div class="hleft"><div class="htrow"><span class="badge bday">Day ${S.day}</span><span class="stitle">${day.title}</span></div><span class="ssub">${day.sub}</span></div>
        <span class="chev op" id="chev-main">▼</span>
      </div>
      <div class="sbody op" id="sb-main">
        <div class="ptrack"><div class="pfill" id="pf-main" style="width:0%"></div></div>
        ${mRows}
        <div class="fblock"><div class="flbl">Session cues</div>${focusHtml}</div>
      </div>
    </div>`;
  updProg();
}

function exRow(ex,w){
  const {r,n}=reps(ex,w);
  const chk=S.checked[ex.id]||false;
  const meta=[ex.sets?ex.sets+'×':'',r].filter(Boolean).join(' ');
  return`<div class="exrow${chk?' done':''}" id="er-${ex.id}">
    <input type="checkbox" ${chk?'checked':''} onchange="chk2('${ex.id}',this.checked)">
    <div class="exc">
      <div class="extop"><span class="exname">${ex.name}</span>${ex.lf?'<span class="badge bleft">Left first</span>':''}</div>
      <div class="exbot"><span class="exreps">${meta}</span><span class="exnote">${n}</span></div>
    </div>
  </div>`;
}

function tog(id){
  const b=document.getElementById('sb-'+id),c=document.getElementById('chev-'+id);
  if(!b)return;
  const o=b.classList.contains('op');
  b.classList.toggle('op',!o);
  c.className='chev'+((!o)?' op':'');
}

function chk2(id,v){
  S.checked[id]=v;
  const r=document.getElementById('er-'+id);
  if(r)r.classList.toggle('done',v);
  save(); updProg();
}

function updProg(){
  const rk=RESET.map(e=>e.id),mk=DAYS[S.day].ex.map(e=>e.id);
  const rd=rk.filter(k=>S.checked[k]).length,md=mk.filter(k=>S.checked[k]).length;
  const rf=document.getElementById('pf-reset'),mf=document.getElementById('pf-main');
  if(rf)rf.style.width=Math.round(rd/rk.length*100)+'%';
  if(mf)mf.style.width=Math.round(md/mk.length*100)+'%';
}

function changeWeek(d){S.week=Math.max(1,Math.min(16,S.week+d));S.checked={};save();rToday();if(cur==='program')rProg();}
function setDay(d){S.day=d;S.checked={};save();rToday();}
function nextDay(){const o=['A','B','C'];S.day=o[(o.indexOf(S.day)+1)%3];S.checked={};save();rToday();}

function markDone(){pending={id:Date.now()+'',date:new Date().toISOString().split('T')[0],day:S.day,week:S.week,phase:phase(S.week).n,done:Object.keys(S.checked).filter(k=>S.checked[k]),total:allIds().length,at:new Date().toISOString()};document.getElementById('mnote').value='';document.getElementById('modal').classList.add('op');}

function saveSession(skip){
  if(!pending)return;
  if(!skip){const n=document.getElementById('mnote').value.trim();if(n)pending.note=n;}
  const today=new Date().toISOString().split('T')[0];
  const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const ws=wkStart();
  if(S.stats.lastDate!==today){
    S.stats.total++;
    S.stats.streak=S.stats.lastDate===yest?S.stats.streak+1:1;
    S.stats.best=Math.max(S.stats.best,S.stats.streak);
    if(S.stats.wkStart!==ws){S.stats.wkCount=0;S.stats.wkStart=ws;}
    S.stats.wkCount++;
    S.stats.lastDate=today;
  }
  S.sessions.push(pending);S.checked={};pending=null;save();
  document.getElementById('modal').classList.remove('op');
  toast('Session saved!');nextDay();
}

function modalBg(e){if(e.target.id==='modal')saveSession(true);}

function rProg(){
  const p=phase(S.week);
  const pl=document.getElementById('prog-phase');
  pl.textContent=p.short;pl.className='ppill '+p.pcls;

  let h='';

  // Phase bar
  h+=`<div style="margin-bottom:12px;">
    <div style="display:flex;gap:3px;height:10px;border-radius:5px;overflow:hidden;margin-bottom:6px;">
      ${PHASES.map(ph=>`<div style="flex:1;background:${ph.color};opacity:${ph.weeks.includes(S.week)?1:0.22};border-radius:2px;"></div>`).join('')}

      ${PHASES.map(ph=>`<div style="flex:1;"><span class="badge ${ph.cls}" style="display:block;text-align:center;">${ph.label}</span></div>`).join('')}
    </div>
  </div>`;

  // Weeks
  for(let w=1;w<=16;w++){
    const wp=phase(w),isCur=w===S.week,chg=CHANGES[w];

function wkDetail(w){
  let h=`<div class="pdsec"><div class="pdlbl">Reset phase (every session)</div>${RESET.map(e=>`<div class="pdex">· ${e.name} <em>${e.reps}</em></div>`).join('')}</div>`;

// ── HISTORY VIEW ─────────────────────────────────────────────

function rHist(){
  const sessions=[...S.sessions].reverse();
  let h='';

  // 14-day strip
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  const doneSet=new Set(S.sessions.map(s=>s.date));
  const strip=[];
  for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);strip.push(d);}
  const dlbl=['S','M','T','W','T','F','S'];
  h+=`<div style="margin-bottom:16px;">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:8px;font-weight:500;">Last 14 days</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
    ${strip.map(d=>{
      const ds=d.toISOString().split('T')[0];
      const done=doneSet.has(ds);
      const isT=ds===todayStr;
      return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div style="font-size:9px;color:var(--text3);">${dlbl[d.getDay()]}</div>
        <div style="width:28px;height:28px;border-radius:50%;
          background:${done?'var(--green-bg)':'var(--surface2)'};
          border:${isT?'2px solid var(--accent)':'1px solid var(--border)'};
          display:flex;align-items:center;justify-content:center;
          font-size:${done?11:10}px;color:${done?'var(--green-text)':'var(--text3)'};">
          ${done?'✓':d.getDate()}
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>`;

  if(!sessions.length){
    h+=`<div class="hempty">No sessions yet.<br>Complete your first session to see it here.</div>`;
  } else {
    sessions.forEach((s,i)=>{
      const p=phase(s.week);
      const pct=s.total?Math.round(s.done.length/s.total*100):0;
      const allEx=[...RESET,...(DAYS[s.day]?.ex||[])];
      h+=`<div class="hcard">
        <div class="hchdr" onclick="togH('hc${i}')">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;">${fmtDate(s.date)} <span style="font-size:12px;color:var(--text3);font-weight:400;">· ${relDate(s.date)}</span></div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
              <span class="badge bday">Day ${s.day}</span>
              <span class="badge ${p.cls}">Wk ${s.week}</span>
              <span style="font-size:12px;color:var(--text2);">${s.done.length}/${s.total} · ${pct}%</span>
            </div>
            ${s.note?`<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px;">"${s.note}"</div>`:''}
          </div>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0;margin-left:8px;">▼</span>
        </div>
        <div class="hcbody" id="hc${i}">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px;font-weight:500;">Exercise log</div>
          ${allEx.map(ex=>{const done=s.done.includes(ex.id);return`<div style="display:flex;gap:8px;padding:3px 0;font-size:12px;color:${done?'var(--text)':'var(--text3)'};">
            <span style="color:${done?'var(--green-text)':'var(--text3)'};">${done?'✓':'○'}</span>
            <span>${ex.name}</span>
          </div>`;}).join('')}
        </div>
      </div>`;
    });
  }

  document.getElementById('hist-body').innerHTML=h;
}

    </div>
    <div class="ccrd">
      <div class="ctitle">Completion rate (last 10 sessions)</div>
      <div style="position:relative;height:130px;"><canvas id="ch-comp"></canvas></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px;">% of exercises checked per session</div>
    </div>`;

  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};

  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tc=dark?'#a0a09a':'#6b6b67';
  const gc=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  Chart.defaults.color=tc;
  Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,sans-serif';
  Chart.defaults.font.size=11;

  // Donut
  const dc=document.getElementById('ch-donut');
  if(dc)charts.donut=new Chart(dc,{type:'doughnut',data:{datasets:[{data:[phPct,100-phPct],backgroundColor:[p.color,dark?'#2a2a28':'#f0efe9'],borderWidth:0}]},options:{responsive:true,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});

  // Sessions per week
  const byWk={};S.sessions.forEach(s=>{byWk[s.week]=(byWk[s.week]||0)+1;});
  const wkLabels=Array.from({length:16},(_,i)=>`W${i+1}`);
  const wkData=wkLabels.map((_,i)=>byWk[i+1]||0);
  const wkColors=wkLabels.map((_,i)=>phase(i+1).color+(dark?'cc':'bb'));
  const wc=document.getElementById('ch-wk');
  if(wc)charts.wk=new Chart(wc,{type:'bar',data:{labels:wkLabels,datasets:[{data:wkData,backgroundColor:wkColors,borderRadius:3,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} session${c.raw!==1?'s':''}`}}},scales:{x:{grid:{display:false},border:{display:false}},y:{ticks:{stepSize:1},grid:{color:gc},border:{display:false},min:0}}}});

  // Completion rate
  const last10=S.sessions.slice(-10);
  const compLabels=last10.map((_,i)=>`S${S.sessions.length-last10.length+i+1}`);
  const compData=last10.map(s=>s.total?Math.round(s.done.length/s.total*100):0);
  const cc2=document.getElementById('ch-comp');
  if(cc2)charts.comp=new Chart(cc2,{type:'line',data:{labels:last10.length?compLabels:['—'],datasets:[{data:last10.length?compData:[0],borderColor:p.color,backgroundColor:p.color+'22',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:p.color,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw}%`}}},scales:{x:{grid:{display:false},border:{display:false}},y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:gc},border:{display:false}}}}});
}

// ── SETTINGS VIEW ─────────────────────────────────────────────

function rSet(){
  const p=phase(S.week);
  document.getElementById('set-body').innerHTML=`
    <div class="setcard">
      <div class="setrow">
        <div><div class="setlbl">Current week</div><div class="setsub">Position in the 16-week program</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="bcircle" onclick="changeWeek(-1);rSet()">−</button>
          <span class="setval">${S.week}</span>
          <button class="bcircle" onclick="changeWeek(1);rSet()">+</button>
        </div>
      </div>
      <div class="setrow">
        <div><div class="setlbl">Current day</div></div>
        <div style="display:flex;gap:6px;">
          ${['A','B','C'].map(d=>`<button onclick="setDay('${d}');rSet()" style="padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:${S.day===d?'var(--accent)':'var(--surface2)'};color:${S.day===d?'#fff':'var(--text)'};font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;">Day ${d}</button>`).join('')}
        </div>
      </div>
      <div class="setrow">
        <div><div class="setlbl">Current phase</div></div>
        <span class="ppill ${p.pcls}">${p.label}</span>
      </div>
    </div>
    <div class="setcard">
      <div class="setrow"><div class="setlbl">Total sessions</div><span class="setval">${S.stats.total}</span></div>
      <div class="setrow"><div class="setlbl">Current streak</div><span class="setval">${S.stats.streak} days</span></div>
      <div class="setrow"><div class="setlbl">Best streak</div><span class="setval">${S.stats.best} days</span></div>
    </div>
    <button class="baction" onclick="exportData()">Export session history (JSON)</button>
    <button class="baction danger" onclick="resetAll()">Reset all data</button>
    <div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0 4px;line-height:1.7;">Training Tracker v2 · Corrective rehabilitation<br>Designed for whiplash recovery + left-side rebalancing</div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(S.sessions,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`training-${new Date().toISOString().split('T')[0]}.json`;a.click();
  URL.revokeObjectURL(url);toast('Exported!');
}

function resetAll(){
  if(confirm('Reset all data? This cannot be undone.'))
  {S=JSON.parse(JSON.stringify(DEF));save();rSet();toast('Data reset.');}
}

// ── INIT ─────────────────────────────────────────────────────
load();
rToday();
</script>
</body>
